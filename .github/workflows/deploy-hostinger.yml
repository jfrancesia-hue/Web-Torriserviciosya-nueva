name: Deploy to Hostinger

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: hostinger-production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Upload public site files
    runs-on: ubuntu-latest
    env:
      DEPLOY_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER || secrets.FTP_SERVER }}
      DEPLOY_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME || secrets.FTP_USERNAME }}
      DEPLOY_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD || secrets.FTP_PASSWORD }}
      DEPLOY_TARGET_DIR: /public_html/

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Missing FTP server secret
        if: ${{ env.DEPLOY_SERVER == '' }}
        run: |
          echo "::error::Missing secret HOSTINGER_FTP_SERVER or FTP_SERVER"
          exit 1

      - name: Missing FTP username secret
        if: ${{ env.DEPLOY_USERNAME == '' }}
        run: |
          echo "::error::Missing secret HOSTINGER_FTP_USERNAME or FTP_USERNAME"
          exit 1

      - name: Missing FTP password secret
        if: ${{ env.DEPLOY_PASSWORD == '' }}
        run: |
          echo "::error::Missing secret HOSTINGER_FTP_PASSWORD or FTP_PASSWORD"
          exit 1

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via lftp without remote deletes
        shell: bash
        run: |
          set -euo pipefail
          echo "Deploying to configured Hostinger directory: ${DEPLOY_TARGET_DIR}"
          lftp -u "${DEPLOY_USERNAME}","${DEPLOY_PASSWORD}" "${DEPLOY_SERVER}" <<EOF
          set ftp:ssl-allow true
          set ftp:passive-mode true
          set net:max-retries 2
          set net:timeout 30
          set xfer:clobber true
          mirror -R --verbose=1 --parallel=2 \
            --exclude-glob .git/ \
            --exclude-glob .git/** \
            --exclude-glob .github/ \
            --exclude-glob .github/** \
            --exclude-glob node_modules/ \
            --exclude-glob node_modules/** \
            --exclude-glob .pnpm-store/ \
            --exclude-glob .pnpm-store/** \
            --exclude-glob .env \
            --exclude-glob .env.* \
            --exclude-glob webhook/.env \
            --exclude-glob webhook/*.txt \
            --exclude-glob webhook/*.json \
            --exclude-glob webhook/*.zip \
            ./ "${DEPLOY_TARGET_DIR}"
          bye
          EOF
