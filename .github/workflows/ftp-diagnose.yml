name: Diagnose Hostinger FTP paths

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  diagnose:
    name: List remote FTP directories
    runs-on: ubuntu-latest
    env:
      DEPLOY_SERVER: ${{ secrets.HOSTINGER_FTP_SERVER || secrets.FTP_SERVER }}
      DEPLOY_USERNAME: ${{ secrets.HOSTINGER_FTP_USERNAME || secrets.FTP_USERNAME }}
      DEPLOY_PASSWORD: ${{ secrets.HOSTINGER_FTP_PASSWORD || secrets.FTP_PASSWORD }}

    steps:
      - name: Validate FTP secrets
        run: |
          test -n "${DEPLOY_SERVER}" || (echo "::error::Missing FTP server" && exit 1)
          test -n "${DEPLOY_USERNAME}" || (echo "::error::Missing FTP username" && exit 1)
          test -n "${DEPLOY_PASSWORD}" || (echo "::error::Missing FTP password" && exit 1)

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: List candidate directories
        shell: bash
        run: |
          set -euo pipefail
          lftp -u "${DEPLOY_USERNAME}","${DEPLOY_PASSWORD}" "${DEPLOY_SERVER}" <<'EOF'
          set ftp:ssl-allow true
          set ssl:verify-certificate no
          set ftp:passive-mode true
          set net:max-retries 1
          set net:timeout 20
          pwd
          echo "--- / ---"
          cls -la /
          echo "--- /public_html ---"
          cls -la /public_html || true
          echo "--- /files ---"
          cls -la /files || true
          echo "--- /files/public_html ---"
          cls -la /files/public_html || true
          echo "--- /domains ---"
          cls -la /domains || true
          echo "--- /domains/tooriserviciosya.com ---"
          cls -la /domains/tooriserviciosya.com || true
          echo "--- /domains/tooriserviciosya.com/public_html ---"
          cls -la /domains/tooriserviciosya.com/public_html || true
          bye
          EOF
